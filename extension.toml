id = "jinja-lsp"
name = "jinja-lsp"
description = "Jinja template language server"
version = "0.1.0"
schema_version = 1
authors = ["uros-5"]
repository = "https://github.com/uros-5/jinja-lsp"

[language_servers.jinja-lsp]
name = "jinja-lsp"
languages = ["HTML", "Jinja", "Rust", "Python"]
command = "./jinja-lsp"
args = ["--stdio"]

[languages.Jinja]
name = "Jinja"
path_suffixes = ["jinja", "j2"]
